<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review Request - Star Pay</title>
    <link rel="stylesheet" href="review-style.css">
</head>
<body class="modal-page-bg">

    <div class="modal-container">
        <header class="modal-header">
            <div class="header-text">
                <h1>Review Withdrawal Request</h1>
                <p>Verify the withdrawal slip before approving the request</p>
            </div>
            <button class="close-btn">✕</button>
        </header>

        <div class="modal-content">
            <section class="details-pane">
                <h2 class="pane-title">👤 Request Details</h2>
                
                <div class="input-group">
                    <label>Date Submitted</label>
                    <div class="input-box">📅 Dec 15, 2024</div>
                </div>

                <div class="input-group">
                    <label>Player Name</label>
                    <div class="input-box">Player Alpha</div>
                </div>

                <div class="input-group">
                    <label>Division</label>
                    <div class="input-box"><span class="badge-mlbb">MLBB</span></div>
                </div>

                <div class="input-group">
                    <label>Points to Convert</label>
                    <div class="input-box text-gold">100000</div>
                </div>

                <div class="input-group">
                    <label>Peso Equivalent</label>
                    <div class="input-box text-green">₱ 400.00</div>
                </div>

                <div class="input-group">
                    <label>GCash Number</label>
                    <div class="input-box">09123456789</div>
                </div>
            </section>

            <section class="slip-pane">
                <h2 class="pane-title">Digital Withdrawal Slip</h2>
                <div class="image-card">
                    <img src="your-figma-export.png" alt="Card Reader Slip">
                    <p class="zoom-hint">Click image to view full size</p>
                </div>
            </section>
        </div>

        <footer class="modal-footer">
            <button class="btn-secondary">Cancel</button>
            <button class="btn-danger">ⓧ Reject</button>
            <button class="btn-primary">✔ Approve Request</button>
        </footer>
    </div>

</body>
</html>
